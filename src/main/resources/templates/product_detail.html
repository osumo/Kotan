<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <title>商品詳細 - Kotan</title>
</head>
<body>

    <h1>商品詳細</h1>

    <!-- 商品が存在する場合 -->
    <div th:if="${product != null}">

        <!-- 商品画像 -->
        <img th:src="${product.imageUrl}"
             alt="商品画像"
             width="300">

        <!-- 商品名 -->
        <h2 th:text="${product.name}"></h2>

        <!-- 商品価格 -->
        <p>
            価格：
            <span th:text="${product.price}"></span>円
        </p>

        <!-- 商品説明 -->
        <p th:text="${product.description}"></p>

    </div>

    <!-- 商品が存在しない場合 -->
    <div th:if="${product == null}">
        <p>商品が見つかりません。</p>
    </div>

    <hr>

    <a th:href="@{/products}">商品一覧へ戻る</a><br>
    <a th:href="@{/}">ホームへ戻る</a>

</body>
</html>
