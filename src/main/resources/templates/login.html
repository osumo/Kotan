<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>ログイン - KOTAN</title>
    <link rel="stylesheet" th:href="@{/css/common.css}">
    <link rel="stylesheet" th:href="@{/css/auth.css}">
</head>

<body>
    <!-- ヘッダーの挿入 -->
    <div th:replace="~{layout/_header :: header}"></div>

    <main class="auth-page">
        <div class="auth-container">
            <h1 class="auth-title">おかえりなさい</h1>
            <p class="auth-subtitle">KOTAN アカウントでログイン</p>

            <div th:if="${successMessage}" class="success-message" style="text-align: center; margin-bottom: 20px; font-weight: 600;">
                <span th:text="${successMessage}"></span>
            </div>

            <div th:if="${loginError}" class="error-message" style="text-align: center; margin-bottom: 20px; font-weight: 600;">
                <span th:text="${loginError}"></span>
            </div>

            <form th:action="@{/login}" th:object="${loginForm}" method="post" class="auth-form">
                <div class="form-group">
                    <label for="email">メールアドレス</label>
                    <input type="email" id="email" th:field="*{email}" placeholder="example@kotan.com" required autofocus>
                </div>

                <div class="form-group">
                    <label for="password">パスワード</label>
                    <input type="password" id="password" th:field="*{password}" placeholder="パスワードを入力" required>
                </div>

                <button type="submit" class="btn-auth">ログイン</button>
            </form>

            <div class="auth-footer">
                アカウントをお持ちでないですか？ <a th:href="@{/register}">新規登録</a>
            </div>
        </div>
    </main>

    <!-- フッターの挿入 -->
    <div th:replace="~{layout/_footer :: footer}"></div>
</body>

</html>
