<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">

<head>
    <meta charset="UTF-8">
    <title>商品一覧 - KOTAN</title>
    <link rel="stylesheet" th:href="@{/css/common.css}">
    <link rel="stylesheet" th:href="@{/css/products.css}">
</head>

<body>
    <div th:replace="~{layout/_header :: header}"></div>

    <main class="container">
        <h1 class="title">商品一覧</h1>
        
        <!-- 絞り込みセクション -->
        <div class="filter-section">
            <form th:action="@{/products}" method="get" class="filter-form">
                <!-- 検索キーワードを保持 -->
                <input type="hidden" name="keyword" th:value="${param.keyword}">
                
                <div class="filter-group">
                    <label for="categoryId">カテゴリ</label>
                    <select name="categoryId" id="categoryId" class="filter-select">
                        <option value="">全カテゴリ</option>
                        <option value="1" th:selected="${param.categoryId == '1'}">農産物</option>
                        <option value="2" th:selected="${param.categoryId == '2'}">水産物</option>
                        <option value="3" th:selected="${param.categoryId == '3'}">畜産物</option>
                        <option value="4" th:selected="${param.categoryId == '4'}">その他</option>
                    </select>
                </div>
                
                <div class="filter-group slider-group">
                    <label>価格範囲: <span id="price-display">0円 〜 100,000円</span></label>
                    <div class="dual-range-slider">
                        <div class="slider-track"></div>
                        <input type="range" name="minPrice" id="min-price" min="0" max="100000" step="100" th:value="${param.minPrice != null ? param.minPrice : 0}">
                        <input type="range" name="maxPrice" id="max-price" min="0" max="100000" step="100" th:value="${param.maxPrice != null ? param.maxPrice : 100000}">
                    </div>
                </div>
                
                <button type="submit" class="filter-btn">絞り込む</button>
                <a th:href="@{/products}" class="filter-reset">リセット</a>
            </form>
        </div>
        
        <div class="product-grid">
            <a th:href="'/product/' + ${product.id}" class="product-card" th:each="product : ${products}">
                <img th:src="${product.imageUrl}" alt="商品画像" class="product-image">
                <div class="product-name" th:text="${product.name}">商品名</div>
                <div class="product-price" th:text="${#numbers.formatDecimal(product.price, 0, 'COMMA', 0, 'POINT')} + '円'"></div>
            </a>
        </div>
        
        <div style="margin-top: 50px; text-align: center;">
            <a th:href="@{/}" style="color: #666; text-decoration: none;">← ホームへ戻る</a>
        </div>
    </main>

    <div th:replace="~{layout/_footer :: footer}"></div>

    <script>
        document.addEventListener('DOMContentLoaded', function () {
            const minSlider = document.getElementById('min-price');
            const maxSlider = document.getElementById('max-price');
            const display = document.getElementById('price-display');
            const track = document.querySelector('.slider-track');

            function updateSlider() {
                let minVal = parseInt(minSlider.value);
                let maxVal = parseInt(maxSlider.value);

                if (maxVal - minVal < 0) {
                    if (this === minSlider) {
                        minSlider.value = maxVal;
                    } else {
                        maxSlider.value = minVal;
                    }
                }

                minVal = parseInt(minSlider.value);
                maxVal = parseInt(maxSlider.value);

                display.textContent = `${minVal.toLocaleString()}円 〜 ${maxVal.toLocaleString()}円`;
                
                // トラックの色付け
                const minPercent = (minVal / 100000) * 100;
                const maxPercent = (maxVal / 100000) * 100;
                track.style.background = `linear-gradient(to right, #eee ${minPercent}%, #333 ${minPercent}%, #333 ${maxPercent}%, #eee ${maxPercent}%)`;
            }

            minSlider.addEventListener('input', updateSlider);
            maxSlider.addEventListener('input', updateSlider);
            
            // 初期表示
            updateSlider();
        });
    </script>
</body>

</html>
