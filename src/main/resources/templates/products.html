<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">

<head>
    <meta charset="UTF-8">
    <title>商品一覧 - KOTAN</title>
    <link rel="stylesheet" th:href="@{/css/common.css}">
    <link rel="stylesheet" th:href="@{/css/products.css}">
</head>

<body>
    <div th:replace="~{layout/_header :: header}"></div>

    <main class="container">
        <h1 class="title">商品一覧</h1>
        
        <!-- 絞り込みセクション -->
        <div class="filter-section">
            <form th:action="@{/products}" method="get" class="filter-form">
                <!-- 検索キーワードを保持 -->
                <input type="hidden" name="keyword" th:value="${param.keyword}">
                
                <div class="filter-group">
                    <label for="categoryId">カテゴリ</label>
                    <select name="categoryId" id="categoryId" class="filter-select">
                        <option value="">全カテゴリ</option>
                        <option value="1" th:selected="${param.categoryId == '1'}">農産物</option>
                        <option value="2" th:selected="${param.categoryId == '2'}">水産物</option>
                        <option value="3" th:selected="${param.categoryId == '3'}">畜産物</option>
                        <option value="4" th:selected="${param.categoryId == '4'}">その他</option>
                    </select>
                </div>
                
                <div class="filter-group" style="flex-grow: 1;">
                    <label>価格範囲</label>
                    <div class="price-range-container" id="page-price-range">
                        <div class="price-values">
                            <span class="min-label">0円</span>
                            <span class="max-label">100,000円</span>
                        </div>
                        <div class="slider-container">
                            <div class="slider-track"></div>
                            <div class="slider-range"></div>
                            <input type="range" name="minPrice" class="price-slider min-slider" min="0" max="100000" step="100" th:value="${param.minPrice != null ? param.minPrice : 0}">
                            <input type="range" name="maxPrice" class="price-slider max-slider" min="0" max="100000" step="100" th:value="${param.maxPrice != null ? param.maxPrice : 100000}">
                        </div>
                    </div>
                </div>
                
                <button type="submit" class="filter-btn">絞り込む</button>
                <a th:href="@{/products}" class="filter-reset">リセット</a>
            </form>
        </div>

        <script>
            function initPriceSlider(containerId) {
                const container = document.getElementById(containerId);
                if (!container) return;

                const minSlider = container.querySelector('.min-slider');
                const maxSlider = container.querySelector('.max-slider');
                const minLabel = container.querySelector('.min-label');
                const maxLabel = container.querySelector('.max-label');
                const range = container.querySelector('.slider-range');

                function updateSlider() {
                    let minVal = parseInt(minSlider.value);
                    let maxVal = parseInt(maxSlider.value);

                    // 最小と最大が逆転しないように制御
                    if (minVal > maxVal) {
                        minSlider.value = maxVal;
                        minVal = maxVal;
                    }

                    const minPercent = (minVal / minSlider.max) * 100;
                    const maxPercent = (maxVal / maxSlider.max) * 100;

                    range.style.left = minPercent + "%";
                    range.style.width = (maxPercent - minPercent) + "%";

                    minLabel.textContent = minVal.toLocaleString() + "円";
                    maxLabel.textContent = maxVal.toLocaleString() + "円";
                }

                minSlider.addEventListener('input', updateSlider);
                maxSlider.addEventListener('input', updateSlider);
                updateSlider(); // 初期表示
            }

            document.addEventListener('DOMContentLoaded', function() {
                initPriceSlider('page-price-range');
            });
        </script>
        
        <div class="product-grid">
            <a th:href="'/product/' + ${product.id}" class="product-card" th:each="product : ${products}">
                <img th:src="${product.imageUrl}" alt="商品画像" class="product-image">
                <div class="product-name" th:text="${product.name}">商品名</div>
                <div class="product-price" th:text="${#numbers.formatDecimal(product.price, 0, 'COMMA', 0, 'POINT')} + '円'"></div>
            </a>
        </div>
        
        <div style="margin-top: 50px; text-align: center;">
            <a th:href="@{/}" style="color: #666; text-decoration: none;">← ホームへ戻る</a>
        </div>
    </main>

    <div th:replace="~{layout/_footer :: footer}"></div>
</body>

</html>
