<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <title>商品一覧 - Kotan</title>
</head>
<body>
    <h1>商品一覧</h1>
    <!-- 担当者: D -->
    <!-- 目的: データベースから取得した商品のリスト表示 -->
    <!-- 補足: Controllerから渡された商品のリストをth:eachでループさせ、一覧としてきれいに表示してください。 -->
    
	<div class="product-container">
	        <!-- productList(Controllerから渡される商品リスト)を1つずつproductとして取り出す -->
	        <div th:each="product : ${products}" class="product-card">
	            <!-- 商品画像 -->
	            <div class="product-image">
	                <!-- 画像パスがDBにある場合。なければダミー画像を表示 -->
	                <img th:src="${product.imagePath != null} ? ${product.imagePath} : 'https://placehold.jp/150x150.png'" alt="商品画像">
	            </div>

	            <!-- 商品名 -->
	            <h2 th:text="${product.name}" class="product-name">商品名</h2>

	            <!-- 商品価格 -->
	            <p class="product-price">
	                &yen;<span th:text="${#numbers.formatInteger(product.price, 3, 'COMMA')}">1,000</span>
	            </p>
	        </div>
	    </div>

	
    <a th:href="@{/}">ホームへ戻る</a>
</body>
</html>
