<!DOCTYPE html>
<html lang="ja" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <title>アカウント作成 - KOTAN</title>

    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: Arial, sans-serif;
        }

        body {
            background-color: #f4f4f4;
        }

        /* ===== ヘッダー ===== */
        header {
            background-color: #d9ecfb;
            height: 70px;

            display: flex;
            align-items: center;
            justify-content: space-between;

            padding: 0 30px;
        }

        .left-header {
            display: flex;
            align-items: center;
            gap: 25px;
        }

        .menu {
            font-size: 28px;
            cursor: pointer;
        }

        .logo {
            font-size: 24px;
            font-weight: bold;
        }

        .right-header {
            display: flex;
            align-items: center;
            gap: 20px;
        }

        .search-box {
            width: 250px;
            height: 35px;
            padding-left: 10px;
        }

        .icon {
            font-size: 26px;
            cursor: pointer;
        }

        /* ===== メイン ===== */
        .container {
            width: 100%;
            display: flex;
            justify-content: center;
            margin-top: 20px;
        }

        .register-box {
            width: 350px;
        }

        .title {
            text-align: center;
            font-size: 48px;
            margin-bottom: 15px;
        }

        .sub-title {
            text-align: center;
            margin-bottom: 45px;
            font-size: 18px;
        }

        .form-group {
            margin-bottom: 25px;
        }

        label {
            display: block;
            font-size: 12px;
            letter-spacing: 2px;
            margin-bottom: 8px;
            color: #555;
        }

        input {
            width: 100%;
            height: 48px;
            border: 1px solid #999;
            padding-left: 15px;
            font-size: 15px;
            background-color: white;
        }

        .signup-btn {
            width: 170px;
            height: 45px;
            background-color: black;
            color: white;
            border: none;
            margin: 20px auto 0;
            display: block;
            cursor: pointer;
            font-size: 15px;
            font-weight: bold;
        }

        .signup-btn:hover {
            opacity: 0.8;
        }
    </style>
</head>

<body>

    <!-- ===== ヘッダー ===== -->
    
    <!-- ===== 登録フォーム ===== -->
    <div class="container">

        <div class="register-box">

            <h1 class="title">アカウント作成</h1>

            

            <form th:action="@{/register}" method="post">

                <div class="form-group">
                    <label>NAME</label>
                    <input type="text"
                           name="name"
                           placeholder="山田　太郎">
                </div>

                <div class="form-group">
                    <label>EMAIL</label>
                    <input type="email"
                           name="email"
                           placeholder="taro@example.com">
                </div>

                <div class="form-group">
                    <label>PASSWORD</label>
                    <input type="password"
                           name="password"
                           placeholder="******">
                </div>

                <div class="form-group">
                    <label>DATE OF BIRTH</label>
                    <input type="date"
                           name="birthday">
                </div>

                <button type="submit" class="signup-btn">
                    sign up
                </button>

            </form>

        </div>

    </div>

</body>
</html>
