<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
</head>
<body>
    <!-- ヘッダーフラグメント -->
    <header th:fragment="header">
        <div class="left-header">
            <div class="menu" id="hamburger-btn">☰</div>
            <a th:href="@{/}" class="logo">KOTAN</a>
        </div>

        <div class="right-header">
            <form th:action="@{/products}" method="get" class="search-form">
                <div class="search-container">
                    <div class="header-filters">
                        <select name="minPrice" class="header-select mini">
                            <option value="">下限</option>
                            <option value="100" th:selected="${param.minPrice == '100'}">100円</option>
                            <option value="1000" th:selected="${param.minPrice == '1000'}">1,000円</option>
                            <option value="5000" th:selected="${param.minPrice == '5000'}">5,000円</option>
                        </select>
                        <span class="header-separator">〜</span>
                        <select name="maxPrice" class="header-select mini">
                            <option value="">上限</option>
                            <option value="1000" th:selected="${param.maxPrice == '1000'}">1,000円</option>
                            <option value="5000" th:selected="${param.maxPrice == '5000'}">5,000円</option>
                            <option value="10000" th:selected="${param.maxPrice == '10000'}">10,000円</option>
                            <option value="100000" th:selected="${param.maxPrice == '100000'}">100,000円</option>
                        </select>
                    </div>
                    <select name="categoryId" class="header-select">
                        <option value="">全カテゴリ</option>
                        <option value="1" th:selected="${param.categoryId == '1'}">農産物</option>
                        <option value="2" th:selected="${param.categoryId == '2'}">水産物</option>
                        <option value="3" th:selected="${param.categoryId == '3'}">畜産物</option>
                        <option value="4" th:selected="${param.categoryId == '4'}">その他</option>
                    </select>
                    <input type="text" name="keyword" placeholder="Search" class="search-box" th:value="${param.keyword}">
                    <button type="submit" class="search-icon-btn">🔍</button>
                </div>
            </form>
            <a th:href="@{/account}" class="icon" title="アカウント情報">
                <img th:src="@{/images/user_icon.png}" alt="Account" class="user-icon-img">
            </a>
        </div>

        <!-- サイドバーメニュー -->
        <div class="overlay" id="menu-overlay"></div>
        <div class="sidebar" id="sidebar-menu">
            <div class="sidebar-header">
                <div class="close-menu" id="close-btn">&times;</div>
            </div>

            <!-- ユーザー情報表示 -->
            <div class="user-info">
                <span class="user-greeting"
                    th:text="'ようこそ ' + (${session.loginUser != null ? session.loginUser.displayName : 'ゲスト'}) + ' さん'">ようこそゲストさん</span>
                <a th:href="@{/account}" class="account-link" title="アカウント情報">
                    <img th:src="@{/images/user_icon.png}" alt="Account" class="user-icon-img">
                </a>
            </div>

            <nav class="sidebar-content">
                <ul>
                    <li><a th:href="@{/account}">アカウント情報</a></li>
                    <li><a th:href="@{/products}">商品一覧</a></li>
                    <li><a th:href="@{/cart}">カート</a></li>
                    <li><a th:href="@{/favorites}">お気に入り</a></li>

                    <th:block th:if="${session.loginUser != null}">
                        <div class="category-title">プレイエリア</div>
                        <li class="sub-menu"><a th:href="@{/}">ROOM</a></li>
                        <li class="sub-menu"><a th:href="@{/garden}">GARDEN</a></li>
                        <li class="sub-menu"><a th:href="@{/aquarium}">AQUARIUM</a></li>
                        <li class="sub-menu"><a th:href="@{/farm}">FARM</a></li>

                        <li class="sub-menu logout-item">
                            <a th:href="@{/logout}" class="logout-link">
                                <span class="logout-icon">⏻</span> ログアウト
                            </a>
                        </li>
                    </th:block>

                </ul>
            </nav>
        </div>

        <script>
            document.addEventListener('DOMContentLoaded', function () {
                const hamburgerBtn = document.getElementById('hamburger-btn');
                const closeBtn = document.getElementById('close-btn');
                const sidebar = document.getElementById('sidebar-menu');
                const overlay = document.getElementById('menu-overlay');
                const body = document.body;

                function toggleMenu() {
                    sidebar.classList.toggle('active');
                    overlay.classList.toggle('active');
                    body.classList.toggle('sidebar-open');
                }

                hamburgerBtn.addEventListener('click', toggleMenu);
                closeBtn.addEventListener('click', toggleMenu);
                overlay.addEventListener('click', toggleMenu);
            });
        </script>
    </header>
</body>

</html>
