<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
</head>
<body>
    <!-- ヘッダーフラグメント -->
    <header th:fragment="header">
        <div class="left-header">
            <div class="menu" id="hamburger-btn">☰</div>
            <a th:href="@{/}" class="logo">KOTAN</a>
        </div>

        <div class="right-header">
            <form th:action="@{/products}" method="get" class="search-form">
                <div class="search-container">
                    <div class="header-filters">
                        <div class="price-range-container" id="header-price-range">
                            <div class="price-values">
                                <span class="min-label">0円</span>
                                <span>〜</span>
                                <span class="max-label">10万</span>
                            </div>
                            <div class="slider-container">
                                <div class="slider-track"></div>
                                <div class="slider-range"></div>
                                <input type="range" name="minPrice" class="price-slider min-slider" min="0" max="100000" step="100" th:value="${param.minPrice != null ? param.minPrice : 0}">
                                <input type="range" name="maxPrice" class="price-slider max-slider" min="0" max="100000" step="100" th:value="${param.maxPrice != null ? param.maxPrice : 100000}">
                            </div>
                        </div>
                    </div>
                    <select name="categoryId" class="header-select">
                        <option value="">全カテゴリ</option>
                        <option value="1" th:selected="${param.categoryId == '1'}">農産物</option>
                        <option value="2" th:selected="${param.categoryId == '2'}">水産物</option>
                        <option value="3" th:selected="${param.categoryId == '3'}">畜産物</option>
                        <option value="4" th:selected="${param.categoryId == '4'}">その他</option>
                    </select>
                    <input type="text" name="keyword" placeholder="Search" class="search-box" th:value="${param.keyword}">
                    <button type="submit" class="search-icon-btn">🔍</button>
                </div>
            </form>
            <a th:href="@{/account}" class="icon" title="アカウント情報">
                <img th:src="@{/images/user_icon.png}" alt="Account" class="user-icon-img">
            </a>
        </div>

        <!-- サイドバーメニュー -->
        <div class="overlay" id="menu-overlay"></div>
        <div class="sidebar" id="sidebar-menu">
            <div class="sidebar-header">
                <div class="close-menu" id="close-btn">&times;</div>
            </div>

            <!-- ユーザー情報表示 -->
            <div class="user-info">
                <span class="user-greeting"
                    th:text="'ようこそ ' + (${session.loginUser != null ? session.loginUser.displayName : 'ゲスト'}) + ' さん'">ようこそゲストさん</span>
                <a th:href="@{/account}" class="account-link" title="アカウント情報">
                    <img th:src="@{/images/user_icon.png}" alt="Account" class="user-icon-img">
                </a>
            </div>

            <nav class="sidebar-content">
                <ul>
                    <li><a th:href="@{/account}">アカウント情報</a></li>
                    <li><a th:href="@{/products}">商品一覧</a></li>
                    <li><a th:href="@{/cart}">カート</a></li>
                    <li><a th:href="@{/favorites}">お気に入り</a></li>

                    <th:block th:if="${session.loginUser != null}">
                        <div class="category-title">プレイエリア</div>
                        <li class="sub-menu"><a th:href="@{/}">ROOM</a></li>
                        <li class="sub-menu"><a th:href="@{/garden}">GARDEN</a></li>
                        <li class="sub-menu"><a th:href="@{/aquarium}">AQUARIUM</a></li>
                        <li class="sub-menu"><a th:href="@{/farm}">FARM</a></li>

                        <li class="sub-menu logout-item">
                            <a th:href="@{/logout}" class="logout-link">
                                <span class="logout-icon">⏻</span> ログアウト
                            </a>
                        </li>
                    </th:block>

                </ul>
            </nav>
        </div>

        <script>
            document.addEventListener('DOMContentLoaded', function () {
                const hamburgerBtn = document.getElementById('hamburger-btn');
                const closeBtn = document.getElementById('close-btn');
                const sidebar = document.getElementById('sidebar-menu');
                const overlay = document.getElementById('menu-overlay');
                const body = document.body;

                function toggleMenu() {
                    sidebar.classList.toggle('active');
                    overlay.classList.toggle('active');
                    body.classList.toggle('sidebar-open');
                }

                function initPriceSlider(containerId) {
                    const container = document.getElementById(containerId);
                    if (!container) return;

                    const minSlider = container.querySelector('.min-slider');
                    const maxSlider = container.querySelector('.max-slider');
                    const minLabel = container.querySelector('.min-label');
                    const maxLabel = container.querySelector('.max-label');
                    const range = container.querySelector('.slider-range');

                    function updateSlider() {
                        let minVal = parseInt(minSlider.value);
                        let maxVal = parseInt(maxSlider.value);

                        if (minVal > maxVal) {
                            minSlider.value = maxVal;
                            minVal = maxVal;
                        }

                        const minPercent = (minVal / minSlider.max) * 100;
                        const maxPercent = (maxVal / maxSlider.max) * 100;

                        range.style.left = minPercent + "%";
                        range.style.width = (maxPercent - minPercent) + "%";

                        minLabel.textContent = minVal.toLocaleString() + "円";
                        maxLabel.textContent = maxVal.toLocaleString() + "円";
                    }

                    minSlider.addEventListener('input', updateSlider);
                    maxSlider.addEventListener('input', updateSlider);
                    updateSlider();
                }

                hamburgerBtn.addEventListener('click', toggleMenu);
                closeBtn.addEventListener('click', toggleMenu);
                overlay.addEventListener('click', toggleMenu);
                
                initPriceSlider('header-price-range');
            });
        </script>
    </header>
</body>

</html>
