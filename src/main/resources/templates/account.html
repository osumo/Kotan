<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>アカウント情報 - KOTAN</title>
    <link rel="stylesheet" th:href="@{/css/common.css}">
    <link rel="stylesheet" th:href="@{/css/account.css}">
</head>

<body>
    <!-- ヘッダーの挿入 -->
    <div th:replace="~{layout/_header :: header}"></div>

    <main class="container account-page">
        <!-- プレイエリアボタン（インライン） -->
        <div th:replace="~{layout/_play_area_buttons :: buttons}"></div>

        <div class="profile-card">
            <div class="profile-header">
                <h1 class="profile-name" th:text="${user.displayName}">ユーザー名</h1>
                <p class="profile-email" th:text="${user.email}">example@kotan.com</p>
            </div>

            <div class="profile-body">
                <div class="stats-grid">
                    <div class="stat-item">
                        <div class="stat-label">累計購入金額</div>
                        <div class="stat-value">
                            ¥<span th:text="${#numbers.formatDecimal(user.totalSpent, 0, 'COMMA', 0, 'POINT')}">0</span>
                        </div>
                    </div>
                    <div class="stat-item">
                        <div class="stat-label">牧場金額</div>
                        <div class="stat-value">
                            ¥<span th:text="${#numbers.formatDecimal(user.totalSpent - user.convertedSpent, 0, 'COMMA', 0, 'POINT')}">0</span>
                        </div>
                    </div>
                </div>

                <div class="account-actions">
                    <a th:href="@{/logout}" class="btn-logout">ログアウト</a>
                </div>
            </div>
        </div>

        <!-- 所持クーポンセクション -->
        <div class="coupons-section">
            <h2 class="section-title">所持クーポン</h2>
            <div th:if="${#lists.isEmpty(userCoupons)}" class="no-coupons">
                所持しているクーポンはありません。
            </div>
            <div th:unless="${#lists.isEmpty(userCoupons)}" class="coupons-grid">
                <div th:each="userCoupon : ${userCoupons}" class="coupon-card">
                    <div class="coupon-header-mini">
                        <span class="discount-badge" th:text="${userCoupon.discountRate + '% OFF'}">10% OFF</span>
                        <h3 class="coupon-name" th:text="${userCoupon.name}">クーポン名</h3>
                    </div>
                    <div class="coupon-body-mini">
                        <p class="coupon-code">コード: <span th:text="${userCoupon.code}">CODE123</span></p>
                        <p class="coupon-min-amount" th:if="${userCoupon.minAmount > 0}">
                            ※¥<span th:text="${#numbers.formatDecimal(userCoupon.minAmount, 0, 'COMMA', 0, 'POINT')}">1,000</span>以上の注文で利用可能
                        </p>
                        <p class="coupon-expiry">
                            期限: <span th:text="${#temporals.format(userCoupon.expireAt, 'yyyy/MM/dd')}">2024/12/31</span>まで
                        </p>
                    </div>
                </div>
            </div>
        </div>
    </main>

    <!-- フッターの挿入 -->
    <div th:replace="~{layout/_footer :: footer}"></div>
</body>

</html>
