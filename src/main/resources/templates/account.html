<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>アカウント情報 - KOTAN</title>
    <link rel="stylesheet" th:href="@{/css/common.css}">
    <link rel="stylesheet" th:href="@{/css/account.css}">
</head>

<body>
    <!-- ヘッダーの挿入 -->
    <div th:replace="~{layout/_header :: header}"></div>

    <main class="container account-page">
        <!-- プレイエリアボタン（インライン） -->
        <div th:replace="~{layout/_play_area_buttons :: buttons}"></div>

        <div class="profile-card">
            <div class="profile-header">
                <div class="profile-avatar">👤</div>
                <h1 class="profile-name" th:text="${user.displayName}">ユーザー名</h1>
                <p class="profile-email" th:text="${user.email}">example@kotan.com</p>
            </div>

            <div class="profile-body">
                <div class="stats-grid">
                    <div class="stat-item">
                        <div class="stat-label">累計購入金額</div>
                        <div class="stat-value">
                            ¥<span th:text="${#numbers.formatDecimal(user.totalSpent, 0, 'COMMA', 0, 'POINT')}">0</span>
                        </div>
                    </div>
                    <div class="stat-item">
                        <div class="stat-label">ガチャコイン変換済</div>
                        <div class="stat-value">
                            ¥<span th:text="${#numbers.formatDecimal(user.convertedSpent, 0, 'COMMA', 0, 'POINT')}">0</span>
                        </div>
                    </div>
                </div>

                <div class="account-actions">
                    <a href="#" class="btn-edit">プロフィール編集</a>
                    <a th:href="@{/logout}" class="btn-logout">ログアウト</a>
                </div>
            </div>
        </div>
    </main>

    <!-- フッターの挿入 -->
    <div th:replace="~{layout/_footer :: footer}"></div>
</body>

</html>
